<div class="login-container">
    <div class="login-bg-pattern"></div>
    
    <div class="login-card glass">
        <div class="login-header">
            <div class="msn-logo">
                <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="24" cy="24" r="22" fill="url(#msnGradient)"/>
                    <path d="M14 32V16L24 12L34 16V32L24 36L14 32Z" fill="white" opacity="0.9"/>
                    <path d="M14 16L24 20L34 16" stroke="white" stroke-width="2" opacity="0.7"/>
                    <circle cx="24" cy="26" r="6" fill="white" opacity="0.3"/>
                    <defs>
                        <linearGradient id="msnGradient" x1="0" y1="0" x2="48" y2="48">
                            <stop stop-color="#00A1E4"/>
                            <stop offset="1" stop-color="#0078D4"/>
                        </linearGradient>
                    </defs>
                </svg>
            </div>
            <h1>Lite Messenger</h1>
            <p>Entre para continuar</p>
        </div>

        <form [formGroup]="loginForm" (ngSubmit)="submit()" class="login-form">
            <div class="form-group">
                <label for="email">Email</label>
                <input 
                    type="email" 
                    id="email" 
                    class="form-control" 
                    name="email" 
                    formControlName="email"
                    placeholder="seu@email.com"
                >
                @if(loginForm.get('email')?.touched && loginForm.get('email')?.hasError('required')) {
                    <span class="error-message">Email é obrigatório</span>
                }
            </div>

            <div class="form-group">
                <label for="password">Senha</label>
                <input 
                    type="password" 
                    id="password" 
                    class="form-control" 
                    name="password" 
                    formControlName="password"
                    placeholder="••••••••"
                >
                @if(loginForm.get('password')?.touched && loginForm.get('password')?.hasError('required')) {
                    <span class="error-message">Senha é obrigatória</span>
                }
            </div>

            <button type="submit" class="btn-primary login-btn" [disabled]="loginForm.invalid">
                Entrar
            </button>
        </form>

        <div class="login-footer">
            <p>Não tem uma conta? <a routerLink="/register">Cadastre-se</a></p>
        </div>
    </div>
</div>
